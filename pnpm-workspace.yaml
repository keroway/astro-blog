packages:
  - ./

# pnpm 11 のサプライチェーン保護はデフォルトで有効
# (https://pnpm.io/blog/releases/11.0):
#   - minimumReleaseAge: 1440 (= 1 day) — 公開直後の悪意あるバージョンを遮断
#   - strictDepBuilds: true             — postinstall などのライフサイクル実行を遮断
#   - blockExoticSubdeps: true          — git URL 等の非標準ソースを間接依存に許可しない
# 以下は既定値の上に追加で固める設定。
#
# minimumReleaseAgeStrict: 制約を満たすバージョンが無いときに resolve を失敗させ、
#   古いバージョンへフォールバックしない (デフォルトの「黙って妥協」を禁止)。
minimumReleaseAgeStrict: true
# trustPolicy: no-downgrade は本来追加で入れたいが、現状 Astro が依存する
# `chokidar@4.0.3` が過去版で持っていた provenance attestation を落としているため
# 全件 install が落ちる。依存側で provenance が復活したら有効化する。

# v11 で onlyBuiltDependencies / ignoredBuiltDependencies は allowBuilds に統合された。
# esbuild / sharp は astro が transitively 依存するが、build スクリプト実行は不要。
allowBuilds:
  esbuild: false
  sharp: false

# v11 では overrides / peerDependencyRules は pnpm-workspace.yaml に置く
# (package.json#pnpm からの移動)。
overrides:
  # rollup@<4.59.0 override は Astro 7 (Vite 8) で削除 — Vite 8 は rollup を rolldown に置き換え、
  # rollup は依存ツリーから消滅したため override が dead になった (2026-06-26)。
  "picomatch@<2.3.2": ">=2.3.2"
  "yaml@>=2.0.0 <2.8.3": ">=2.8.3"
  "postcss@<8.5.10": ">=8.5.10"
  # GHSA-g7r4-m6w7-qqqr / GHSA-dhv9 (esbuild <0.28.1) — ^0.28.1 で 0.x に固定 (>=0.28.1 は 1.x 以上も含んでしまうため)
  "esbuild@<0.28.1": "^0.28.1"
  # GHSA-9wv6-86v2-598j (path-to-regexp 6.x <6.3.0) — ^6.3.0 で 6.x に固定 (>=6.3.0 は 8.x も含んでしまうため)
  "path-to-regexp@>=6.0.0 <6.3.0": "^6.3.0"
  # tar <7.5.16 (PAX size override による file smuggling) — @astrojs/vercel>@vercel/nft>@mapbox/node-pre-gyp 経由。
  # 7.x 内に固定。upstream が修正版を取り込んだら削除する。
  "tar@<7.5.16": ">=7.5.16 <8"
  # js-yaml <4.2.0 (merge key 処理の二次計算量 DoS) — @keystatic/core 由来分は削除済みだが、
  # Astro 7 で @astrojs/internal-helpers 経由で引き続きツリーに存在するため維持。
  "js-yaml@>=4.0.0 <4.2.0": ">=4.2.0 <5"

# keystatic 関連のルール群 (ADR 0016 で Keystatic を Sveltia へ移行済み):
# - peerDependencyRules.allowedVersions["@keystatic/astro>astro"] → 削除
# - patchedDependencies["@keystatic/core"]                        → 削除
