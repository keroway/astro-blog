name: Feature request
description: 機能要望を提案する
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能提案ありがとうございます。背景と提案内容を詳しく記入してください。
  - type: textarea
    id: background
    attributes:
      label: 背景・動機
      description: なぜこの機能が必要か、現状の課題を説明してください。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 何を実装してほしいか具体的に説明してください。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に考えられる解決策があれば記入してください。
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: 補足
      description: 参考リンク・関連 Issue など
    validations:
      required: false
