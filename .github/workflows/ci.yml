# CI workflow.
#
# Design note: `pnpm run build` is `astro check && astro build`, so typecheck
# is normally bundled into build. We split them into separate jobs (`typecheck`
# runs `astro check`, `build` runs `astro build` directly) so they run in
# parallel and surface failures faster on PRs. The minor duplication is
# acceptable for the latency win.
#
# pnpm install path: we use `pnpm/action-setup@v6` (the path pnpm officially
# recommends for GitHub Actions) instead of the corepack route used in
# `vercel.json`. Reasons: corepack is no longer bundled with Node.js >=25,
# and the corepack version shipped inside Node.js can hit signing-key
# verification failures during `corepack prepare`. Vercel's build environment
# is independent of CI; both still pin pnpm@11.1.3 via the `packageManager`
# field in package.json, so behaviour stays consistent.
#
# Node version: Astro 6 requires Node >= v22.12.0 (even-numbered releases
# only). LTS 22 is the floor.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a rapid succession of pushes to
# a PR doesn't queue up redundant CI work.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only by default; no job here needs write access to the repo.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # pnpm version is resolved from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome lint
        run: pnpm run lint

      # `scripts/lint-alt.ts` を走らせ、MIN_ALT_LENGTH (= 4) 未満の alt が
      # 含まれる markdown を退行検知する。
      - name: Lint markdown alt text
        run: pnpm run lint:alt

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # pnpm version is resolved from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run astro check
        run: pnpm exec astro check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Skip `astro check` here -- the `typecheck` job covers it. We invoke
      # `astro build` directly instead of `pnpm run build` to avoid duplication.
      - name: Build
        run: pnpm exec astro build

  test:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the site so dist/sitemap-index.xml exists for the sitemap test.
      # The `typecheck` job covers `astro check`, so we skip it here.
      - name: Build
        run: pnpm exec astro build

      # chromium / firefox / mobile-chromium (Pixel 5) are configured in
      # playwright.config.ts. Install chromium and firefox with OS-level deps.
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run Playwright tests
        run: pnpm exec playwright test

      # Upload the HTML report on failure so flakes / regressions can be
      # diagnosed without re-running the suite locally.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the static output. Vercel adapter emits static pages to dist/client/.
      # The `typecheck` job covers `astro check`, so we skip it here.
      - name: Build
        run: pnpm exec astro build

      # lhci autorun uses staticDistDir (dist/client) and spins up its own server.
      # numberOfRuns: 3 and per-category assertions are in lighthouserc.cjs.
      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14 autorun

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lhci-reports
          path: lhci-reports
          retention-days: 7

  linkcheck:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the static output (dist/client). The `typecheck` job covers
      # `astro check`, so we skip it here for parity with the other build jobs.
      - name: Build
        run: pnpm exec astro build

      # Restore lychee's request cache between runs so external URLs are not
      # re-fetched needlessly. max_cache_age in lychee.toml controls staleness.
      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.run_id }}
          restore-keys: |
            lychee-cache-

      # Scan built HTML directly (--root-dir resolves absolute links like
      # /blog/foo/ to dist/client/blog/foo/index.html via --fallback-extensions).
      # This mode preserves per-file context so same-page #fragment anchors
      # resolve correctly, which `--base-url` would not. Retry/timeout/accept
      # codes and excludes are configured in lychee.toml.
      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # `--include-fragments` is passed on the CLI rather than in lychee.toml
          # because the toml syntax for that key is incompatible between lychee
          # v0.23 (boolean) and v0.24+ (string variant). On the CLI the flag form
          # without a value works for both: v0.23 treats it as true, v0.24+ as
          # the default "full" variant.
          args: >-
            --no-progress
            --include-fragments
            --root-dir ${{ github.workspace }}/dist/client
            --fallback-extensions html
            'dist/client/**/*.html'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: true
