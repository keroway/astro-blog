# Remove lifecycle labels on close.
#
# CLAUDE.md の Issue ライフサイクル運用 (`in-progress` → `in-review` → close) で
# 残留しやすい `in-progress` / `in-review` ラベルを close 時に自動除去する。
#
# トリガ:
#   - Issue が close されたとき
#   - PR が merged で close されたとき (関連 Issue 側のラベルも落とす想定はせず、
#     PR 自身に付いたラベルだけ除去する)
#   - workflow_dispatch で手動再実行
name: Remove in-progress label on close

on:
  issues:
    types: [closed]
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      number:
        description: 'Issue または PR の番号'
        required: true
        type: string

permissions:
  issues: write
  pull-requests: write

jobs:
  remove-labels:
    runs-on: ubuntu-latest
    # PR の場合は merged のときだけ実行 (close-without-merge では何もしない)。
    if: >-
      github.event_name == 'issues' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Remove in-progress / in-review labels
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NUMBER: >-
            ${{ github.event_name == 'workflow_dispatch'
                && inputs.number
                || (github.event.issue.number || github.event.pull_request.number) }}
        run: |
          set -euo pipefail
          # workflow_dispatch 経由で渡る値は信用しない。整数のみ許可。
          if ! [[ "$NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid number: $NUMBER"
            exit 1
          fi
          for label in in-progress in-review; do
            if gh issue view "$NUMBER" --repo "$REPO" --json labels \
              --jq '.labels[].name' | grep -Fxq "$label"; then
              echo "Removing label: $label"
              gh issue edit "$NUMBER" --repo "$REPO" --remove-label "$label"
            else
              echo "Label not present, skipping: $label"
            fi
          done
