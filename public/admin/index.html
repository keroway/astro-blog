<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- robots: admin は検索インデックス不要 (vercel.json の X-Robots-Tag と二重防衛) -->
    <meta name="robots" content="noindex, nofollow" />
    <title>keroway CMS</title>
    <!--
      Sveltia CMS — CDN 配信の静的 SPA。
      Astro バージョンに依存しないため、Astro メジャーアップ時もここを変更不要。
      最新版: https://github.com/sveltia/sveltia-cms/releases
      設定:   public/admin/config.yml
      認証:   OAuth プロキシ (Cloudflare Workers sveltia-cms-auth) または
              ローカル開発は File System Access API (ログイン画面の「ローカルリポジトリ」)
    -->
    <script
      src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"
      type="module"
    ></script>
  </head>
  <body>
    <!-- 設定は public/admin/config.yml で管理。HTML は変更不要。 -->
  </body>
</html>
