# Sveltia CMS 設定 (ADR 0016)
# Decap CMS 互換フォーマット。Sveltia CMS は src/pages/admin.astro で @sveltia/cms npm パッケージから
# バンドルされる静的 SPA (ADR 0016 / Plan 001)。Astro に依存しないためバージョンロックが発生しない。
#
# ────────────────────────────────────────
# 認証 (本番)
# ────────────────────────────────────────
# GitHub backend は OAuth Authorization Code フローを使用する。
# Cloudflare Workers 製 OAuth プロキシ (sveltia-cms-auth) と
# GitHub OAuth App のセットアップが必要。
# セットアップ手順: docs/cms-flow.md を参照。
# base_url は Cloudflare Workers の sveltia-cms-auth URL。
#
# ────────────────────────────────────────
# 認証 (ローカル開発)
# ────────────────────────────────────────
# pnpm run dev:astro で起動後、http://localhost:4321/admin を開く。
# ログイン画面の「ローカルリポジトリを使う」(File System Access API) を選択し、
# リポジトリのルートディレクトリを指定する。OAuth プロキシは不要。

backend:
  name: github
  repo: keroway/astro-blog
  branch: main
  base_url: https://sveltia-cms-auth.kurokawa-y.workers.dev

# Sveltia CMS は Editorial Workflow 未対応。
# 保存時は Simple Workflow として直接ブランチ/コミットを扱う。
# main への反映は GitHub のブランチ保護・PR レビュー・CI で担保する。

# メディアファイルのデフォルト保存先 (各フィールドで上書き可)
media_folder: src/assets/content
public_folder: /src/assets/content

# ──────────────────────────────────────────────────────
# コレクション定義
# format: yaml-frontmatter — config.yml 上は schema-valid な標準形式として記述。
# 実行時は src/pages/admin.astro が blog / works を custom format `mdoc` に差し替える。
# ──────────────────────────────────────────────────────
collections:
  # ────────────────────────────────
  # Blog
  # ────────────────────────────────
  - name: blog
    label: ブログ記事
    label_singular: 記事
    folder: src/content/blog
    format: yaml-frontmatter
    create: true
    identifier_field: title
    preview_path: /blog/{{slug}}/
    summary: "{{pubDate}} — {{title}}"
    sortable_fields:
      - pubDate
      - title
    view_groups:
      - label: カテゴリ
        field: category
      - label: 年
        field: pubDate
        pattern: \d{4}
    fields:
      # --- 基本情報（公開に必須） ---
      - label: 記事タイトル
        name: title
        widget: string
        hint: 一覧・詳細ページ・SNS で表示する記事名。保存時の URL slug（ファイル名）はこのタイトルから自動生成されます。後から変えたい場合は一覧のファイル名変更機能を使います。

      - label: 記事概要
        name: description
        widget: text
        hint: 記事カード、SNS シェア、検索結果、AI の回答引用に使う要約文（1〜2 文）。記事の結論・答えを含めて書きます。

      # --- 公開設定 ---
      - label: 公開日
        name: pubDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        hint: 記事一覧の並び順と公開可否判定に使用。

      - label: 下書きにする
        name: draft
        widget: boolean
        default: false
        hint: オンにすると本番公開されません。新規作成中はオンにしておくと安全です。

      # --- 本文 ---
      - label: 本文
        name: body
        widget: markdown
        media_folder: /src/assets/content/blog
        public_folder: /src/assets/content/blog

      # --- 分類・メタデータ（任意） ---
      - label: カテゴリ（任意）
        name: category
        widget: select
        required: false
        options:
          - { label: "開発・プログラミング", value: dev }
          - { label: "ハードウェア・電子工作", value: hardware }
          - { label: "ツール・インフラ", value: tools }
          - { label: "読書", value: reading }
          - { label: "イベント・参加記", value: event }

      - label: シリーズ名（任意）
        name: series
        widget: string
        required: false
        hint: 連作記事のシリーズ名。設定すると同じシリーズ内の前後ナビゲーションを表示します。

      - label: タグ（任意）
        name: tags
        widget: list
        required: false
        hint: 検索・関連記事の判定に使うキーワード。既存タグの再利用を優先します。

      - label: 著者名（任意）
        name: author
        widget: string
        required: false
        hint: 省略時はサイト既定の著者名を使います。

      - label: 更新日（任意）
        name: updatedDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        required: false
        hint: 内容を大きく更新した場合のみ設定します。未設定なら表示しません。

      # --- 画像・SEO（任意） ---
      - label: ヒーロー画像（任意）
        name: heroImage
        widget: image
        required: false
        media_folder: /src/assets/content/blog
        public_folder: /src/assets/content/blog
        hint: 記事カードのサムネイル画像。16:9 の画像を推奨します。

      - label: SNS シェア画像（任意）
        name: ogImage
        widget: image
        required: false
        media_folder: /src/assets/content/blog
        public_folder: /src/assets/content/blog
        hint: SNS シェア時のサムネイル画像。省略時はタイトルから 1200×630 の画像を自動生成します。

      - label: 正規 URL（任意）
        name: canonicalUrl
        widget: string
        required: false
        hint: 外部掲載などで canonical URL が別にある場合のみ設定します。

  # ────────────────────────────────
  # Works
  # ────────────────────────────────
  - name: works
    label: 制作物
    label_singular: 制作物
    folder: src/content/works
    format: yaml-frontmatter
    create: true
    identifier_field: title
    preview_path: /works/{{slug}}/
    summary: "{{status}} — {{title}}"
    sortable_fields:
      - createdAt
      - title
    view_groups:
      - label: ステータス
        field: status
    fields:
      # --- 基本情報（公開に必須） ---
      - label: プロジェクト名
        name: title
        widget: string
        hint: 一覧・詳細ページ・SNS で表示する制作物名。保存時の URL slug（ファイル名）はこのタイトルから自動生成されます。

      - label: 制作物概要
        name: description
        widget: text
        hint: 制作物一覧、SNS シェア、検索結果に使う要約文（1〜2 文）。

      # --- 公開設定 ---
      - label: ステータス
        name: status
        widget: select
        options:
          - { label: "公開中", value: active }
          - { label: "アーカイブ", value: archived }
          - { label: "作業中", value: wip }
        default: active

      - label: トップページに掲載する
        name: featured
        widget: boolean
        default: false
        hint: オンにするとトップページの注目制作物枠に表示します。

      # --- 本文 ---
      - label: 本文
        name: body
        widget: markdown
        media_folder: /src/assets/content/works
        public_folder: /src/assets/content/works

      # --- 詳細情報 ---
      - label: タグ
        name: tags
        widget: list
        hint: 技術スタック、カテゴリ、関連トピックなどのキーワード。

      - label: 作成日
        name: createdAt
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        hint: プロジェクト開始日。

      - label: 更新日（任意）
        name: updatedAt
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        required: false
        hint: 内容を大きく更新した場合のみ設定します。未設定なら表示しません。

      # --- 関連 URL ---
      - label: 紹介ページ URL
        name: lpUrl
        widget: string
        hint: 機能紹介・外部紹介ページの URL。

      - label: リポジトリ URL（任意）
        name: repoUrl
        widget: string
        required: false
        hint: GitHub など、実装を参照できるリポジトリ URL。

      - label: デモ URL（任意）
        name: demoUrl
        widget: string
        required: false
        hint: 動作デモが公開されている場合のみ設定します。

      # --- 画像（任意） ---
      - label: ヒーロー画像（任意）
        name: heroImage
        widget: image
        required: false
        media_folder: /src/assets/content/works
        public_folder: /src/assets/content/works
        hint: 制作物カードのサムネイル画像。16:9 の画像を推奨します。
