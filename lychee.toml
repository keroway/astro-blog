# lychee リンク切れ検査の共通設定。
# 関連: .github/workflows/ci.yml の `linkcheck` ジョブ、
#       scripts/serve-static-with-redirects.mjs (vercel.json redirect 再現用のローカル static server)
# 参考: keroway/code-tactics-lp の lychee.toml

# 一時的な外部障害・レート制限による誤検知を抑える。
max_retries = 3
retry_wait_time = 2
timeout = 20

# 同一 URL の重複検査を避け CI 実行時間を短縮する。
cache = true
max_cache_age = "2d"
cache_exclude_status = "500.."

# 許容ステータスコード。
# - 200..=299: 当然 OK
# - 403: 外部サービスの bot ブロック (Kickstarter 等) を許容。ユーザーがブラウザで開けば
#   到達できるリンクを CI で恒久的に落とす意味がない。
# - 429: レート制限の flaky 回避。受け入れ条件「外部 URL の一時的なレート制限で CI が
#   不安定にならない」を満たすため。
accept = ["200..=299", "403", "429"]

# 内部アンカー (#section) も含めて検証する (受け入れ条件)。
# lychee-action 同梱の v0.23 と v0.24+ で toml 構文が非互換 (bool vs string variant) のため、
# CLI 側 (--include-fragments) で渡す。

# 除外パターン (正規表現)。F2 (検査の骨抜き禁止) を守り、各パターンには「なぜ除外しているか」
# をコメントで明示する。プロトコル/ホストに依らずパス断片でマッチさせるのは、ローカル file:// と
# HTTP server (http://localhost:...) どちらのスキャンモードでも同じパターンで通すため。
exclude = [
    # mailto: は SMTP MX を引くだけで実 inbox は分からない。到達確認の意味がない。
    "^mailto:",

    # SiteLayout が 404.html に出力する canonical URL は `<site>/404/` というディレクトリ形
    # パスになるが、Vercel は 404 を 404.html ファイルとして配信するため `/404/` は存在しない。
    # 404 ページの canonical は SEO 的にも意味を持たないので除外。
    "/404/?$",
]
